name: Release Clarity of Sound

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to upload (e.g. 1.2.0)
        required: true

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set version
        run: echo "VERSION=${{ github.event.release.tag_name || inputs.version }}" >> "$GITHUB_ENV"

      - name: Package (no git artefacts)
        run: |
          git archive --format=zip --prefix="Clarity of Sound/" \
            -o "Clarity-${VERSION}.zip" HEAD

      - name: Verify zip contents
        run: |
          unzip -l "Clarity-${VERSION}.zip"
          if unzip -l "Clarity-${VERSION}.zip" | grep -E '\.git|\.github'; then
            echo "Git artefacts found in zip" && exit 1
          fi
          unzip -l "Clarity-${VERSION}.zip" | grep -q 'Clarity of Sound/Clarity of Sound.mod' \
            || { echo "Missing Clarity of Sound.mod" && exit 1; }

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: Clarity-${{ env.VERSION }}
          path: Clarity-${{ env.VERSION }}.zip

      - name: Upload to Nexus Mods
        if: ${{ !github.event.release.prerelease }}
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        with:
          api_key: ${{ secrets.NEXUSMODS_APIKEY }}
          file_id: ${{ vars.NEXUS_FILE_ID }}
          filename: Clarity-${{ env.VERSION }}.zip
          version: ${{ env.VERSION }}
          display_name: Clarity of Sound ${{ env.VERSION }}
          category: main
          description: ${{ github.event.release.body }}
